<body>
  <div id="status">Ready.</div>
  <div style="padding: 12px; background: #fff;">
    <button id="loadButton" type="button">Load dashboard</button>
  </div>
  <div id="reportContainer"></div>

  <script>
    const reportId = "03bd2531-59bc-4fc8-a194-b65ecc2da216";
    const groupId = "45d694f7-645d-4408-905b-b0b07f8d8fd6";
    const pageName = "b4835cfc77aa7e7e2bf6";
    const tableName = "project_EP_dashboard";
    const columnName = "matched_project_lib_id";
    const redirectUri = "https://thtotpoc.github.io/EP_Project/";

    const libId = new URLSearchParams(window.location.search).get("libId");
    const statusEl = document.getElementById("status");
    const loadButton = document.getElementById("loadButton");

    function setStatus(message) {
      statusEl.textContent = message;
      console.log(message);
    }

    function showError(error) {
      const message = error && error.message ? error.message : String(error);
      statusEl.textContent = "Error:\n" + message;
      console.error(error);
    }

    const msalApp = new msal.PublicClientApplication({
      auth: {
        clientId: "29a0fbc8-56af-441c-9f5a-1f7494a2d23f",
        authority: "https://login.microsoftonline.com/971aa8fb-beb9-4780-a117-0013ed22d332",
        redirectUri: redirectUri
      },
      cache: {
        cacheLocation: "sessionStorage"
      }
    });

    async function getPowerBiToken() {
      setStatus("Initializing Microsoft sign-in...");
      await msalApp.initialize();

      let account = msalApp.getAllAccounts()[0];

      if (!account) {
        setStatus("Opening Microsoft sign-in...");
        await msalApp.loginPopup({
          scopes: ["https://analysis.windows.net/powerbi/api/Report.Read.All"]
        });
        account = msalApp.getAllAccounts()[0];
      }

      setStatus("Getting Power BI access token...");
      const token = await msalApp.acquireTokenSilent({
        account,
        scopes: ["https://analysis.windows.net/powerbi/api/Report.Read.All"]
      });

      return token.accessToken;
    }

    async function embedReport() {
      const accessToken = await getPowerBiToken();
      const models = window["powerbi-client"].models;

      const filters = libId ? [{
        $schema: "http://powerbi.com/product/schema#basic",
        target: {
          table: tableName,
          column: columnName
        },
        operator: "In",
        values: [libId],
        filterType: models.FilterType.Basic
      }] : [];

      setStatus("Embedding report...");

      const config = {
        type: "report",
        tokenType: models.TokenType.Aad,
        accessToken: accessToken,
        id: reportId,
        embedUrl: "https://app.powerbi.com/reportEmbed?reportId=" + reportId + "&groupId=" + groupId,
        pageName: pageName,
        filters: filters,
        settings: {
          panes: {
            filters: { visible: false },
            pageNavigation: { visible: false }
          }
        }
      };

      const report = powerbi.embed(document.getElementById("reportContainer"), config);

      report.on("loaded", function () {
        setStatus("Report loaded.");
      });

      report.on("rendered", function () {
        setStatus("Report rendered.");
      });

      report.on("error", function (event) {
        showError(event.detail);
      });
    }

    loadButton.addEventListener("click", function () {
      loadButton.disabled = true;
      embedReport().catch(function (error) {
        loadButton.disabled = false;
        showError(error);
      });
    });
  </script>
</body>
