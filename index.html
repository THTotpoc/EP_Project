<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Total EP Dashboard</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
    }

    #status {
      padding: 16px;
      background: #111827;
      color: #fff;
      font-size: 14px;
      white-space: pre-wrap;
    }

    #toolbar {
      padding: 12px 16px;
      background: #fff;
      border-bottom: 1px solid #ddd;
    }

    #loadButton {
      padding: 10px 16px;
      font-size: 14px;
      cursor: pointer;
    }

    #reportContainer {
      height: calc(100vh - 110px);
      min-height: 700px;
      background: #fff;
    }
  </style>
  <script src="https://unpkg.com/@azure/msal-browser@4.21.1/lib/msal-browser.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/powerbi-client@2.23.1/dist/powerbi.min.js"></script>
</head>
<body>
  <div id="status">Initializing...</div>
  <div id="toolbar">
    <button id="loadButton" type="button" disabled>Load dashboard</button>
  </div>
  <div id="reportContainer"></div>

  <script>
    const reportId = "03bd2531-59bc-4fc8-a194-b65ecc2da216";
    const groupId = "45d694f7-645d-4408-905b-b0b07f8d8fd6";
    const pageName = "b4835cfc77aa7e7e2bf6";
    const tableName = "project_EP_dashboard";
    const columnName = "matched_project_lib_id";
    const redirectUri = "https://thtotpoc.github.io/EP_Project/";

    const libId = new URLSearchParams(window.location.search).get("libId");
    const statusEl = document.getElementById("status");
    const loadButton = document.getElementById("loadButton");

    function setStatus(message) {
      statusEl.textContent = message;
      console.log(message);
    }

    function showError(error) {
      const message = error && error.message ? error.message : String(error);
      statusEl.textContent = "Error:\n" + message;
      console.error(error);
      loadButton.disabled = false;
    }

    const msalApp = new msal.PublicClientApplication({
      auth: {
        clientId: "29a0fbc8-56af-441c-9f5a-1f7494a2d23f",
        authority: "https://login.microsoftonline.com/971aa8fb-beb9-4780-a117-0013ed22d332",
        redirectUri: redirectUri
      },
      cache: {
        cacheLocation: "sessionStorage"
      }
    });

    async function initApp() {
      await msalApp.initialize();
      setStatus("Ready.");
      loadButton.disabled = false;
    }

    async function getPowerBiToken() {
      const scopes = ["https://analysis.windows.net/powerbi/api/Report.Read.All"];
      let account = msalApp.getAllAccounts()[0];

      if (!account) {
        setStatus("Opening Microsoft sign-in...");
        const loginResponse = await msalApp.loginPopup({ scopes });
        account = loginResponse.account;
      }

      setStatus("Getting Power BI access token...");
      try {
        const tokenResponse = await msalApp.acquireTokenSilent({
          account,
          scopes
        });
        return tokenResponse.accessToken;
      } catch (error) {
        setStatus("Interactive consent/sign-in required...");
        const tokenResponse = await msalApp.acquireTokenPopup({
          account,
          scopes
        });
        return tokenResponse.accessToken;
      }
    }

    async function embedReport() {
      loadButton.disabled = true;
      const accessToken = await getPowerBiToken();
      const models = window["powerbi-client"].models;

      const filters = libId ? [{
        $schema: "http://powerbi.com/product/schema#basic",
        target: {
          table: tableName,
          column: columnName
        },
        operator: "In",
        values: [libId],
        filterType: models.FilterType.Basic
      }] : [];

      setStatus("Embedding report...");

      const config = {
        type: "report",
        tokenType: models.TokenType.Aad,
        accessToken,
        id: reportId,
        embedUrl: "https://app.powerbi.com/reportEmbed?reportId=" + reportId + "&groupId=" + groupId,
        pageName,
        filters,
        settings: {
          panes: {
            filters: { visible: false },
            pageNavigation: { visible: false }
          }
        }
      };

      const report = powerbi.embed(document.getElementById("reportContainer"), config);

      report.on("loaded", function () {
        setStatus("Report loaded.");
      });

      report.on("rendered", function () {
        setStatus("Report rendered.");
      });

      report.on("error", function (event) {
        showError(event.detail);
      });
    }

    loadButton.addEventListener("click", function () {
      embedReport().catch(showError);
    });

    initApp().catch(showError);
  </script>
</body>
</html>
